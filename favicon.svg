<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff2d55"/>
      <stop offset="100%" stop-color="#ff6b35"/>
    </linearGradient>
    <linearGradient id="btn" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff4466"/>
      <stop offset="100%" stop-color="#cc1133"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)"/>
  <circle cx="32" cy="32" r="28" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.3"/>
  <!-- Buzzer base -->
  <ellipse cx="32" cy="44" rx="16" ry="5" fill="#1a1a35" opacity="0.6"/>
  <!-- Buzzer body -->
  <rect x="22" y="34" width="20" height="12" rx="3" fill="#1a1a35"/>
  <!-- Buzzer button (big red dome) -->
  <ellipse cx="32" cy="34" rx="14" ry="9" fill="url(#btn)"/>
  <ellipse cx="32" cy="32" rx="10" ry="6" fill="#ff5577" opacity="0.6"/>
  <ellipse cx="30" cy="30" rx="4" ry="2.5" fill="#fff" opacity="0.4"/>
  <!-- Question mark -->
  <text x="32" y="26" text-anchor="middle" font-family="Arial Black,Arial,sans-serif" font-size="22" font-weight="900" fill="#ffd700" stroke="#000" stroke-width="1">?</text>
</svg>
